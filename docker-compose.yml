name: r3-recipe-manager

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - recipe-data:/app/data
    environment:
      RECIPE_DB_PATH: /app/data/recipes.db

  ui:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  recipe-data:
